# Flexiv Rizon 4s robot config for hand-eye capture.
#
# The board is on the FLANGE, so the reader returns T_base_flange (NOT tcp_pose). joint_targets is an
# optional list of diverse poses to auto-step through during capture; leave empty to capture manually
# by hand-guiding the arm. Aim for >=20 poses spanning >=3 non-parallel wrist-rotation axes and a
# range of camera distances -- the diversity gate will refuse a near-coplanar set.
robot:
  host: 192.168.0.105
  serial: null
  owner: handeye
  max_joint_speed: 0.3
  settle_vel_eps: 0.001
  settle_dwell_s: 1.2
  joint_targets: []
